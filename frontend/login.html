<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaAI - تسجيل الدخول</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page" style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
    <div class="card" style="width: 100%; max-width: 400px;">
        <h2 style="text-align: center; margin-bottom: 2rem;">تسجيل الدخول</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="email" required placeholder="example@mail.com">
            </div>
            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" id="password" required placeholder="********">
            </div>
            <button type="submit" style="width: 100%;">دخول</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">
            ليس لديك حساب؟ <a href="register.html" style="color: var(--primary-color);">أنشئ حسابك الآن</a>
        </p>
    </div>
    <script src="script.js"></script>
</body>
</html>
