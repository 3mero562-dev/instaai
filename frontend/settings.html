<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الإعدادات - InstaAI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <h2 style="color: var(--primary-color); margin-bottom: 2rem;">InstaAI</h2>
            <nav>
                <a href="dashboard.html" class="nav-link">الرئيسية</a>
                <a href="settings.html" class="nav-link active">الإعدادات</a>
                <a href="#" onclick="logout()" class="nav-link" style="color: var(--danger); margin-top: 2rem;">تسجيل الخروج</a>
            </nav>
        </aside>
        <main class="main-content">
            <h1>إعدادات البوت والذكاء الاصطناعي</h1>
            
            <form id="settingsForm" class="card" style="margin-top: 1.5rem;">
                <div class="form-group" style="display: flex; align-items: center; justify-content: space-between; background: #f9fafb; padding: 1rem; border-radius: 0.5rem;">
                    <div>
                        <label style="margin-bottom: 0;">حالة تشغيل البوت</label>
                        <small class="text-muted">قم بتفعيل أو تعطيل الرد التلقائي</small>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="botStatus">
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="form-group">
                    <label>وصف العمل (Business Description)</label>
                    <textarea id="businessDescription" rows="3" placeholder="اكتب نبذة عن عملك ليتمكن البوت من معرفتها..."></textarea>
                </div>

                <div class="form-group">
                    <label>تعليمات الذكاء الاصطناعي (AI Instructions)</label>
                    <textarea id="aiInstructions" rows="4" placeholder="مثلاً: رد بأسلوب مرح، لا تتحدث عن الأسعار..."></textarea>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Instagram Page ID</label>
                        <input type="text" id="instagramPageId" placeholder="ID الخاص بالصفحة">
                    </div>
                    <div class="form-group">
                        <label>Instagram Access Token</label>
                        <input type="password" id="instagramAccessToken" placeholder="رمز الوصول">
                    </div>
                </div>

                <button type="submit" style="width: 100%; margin-top: 1rem;">حفظ كافة الإعدادات</button>
            </form>
        </main>
    </div>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadSettings();
        });
    </script>
</body>
</html>
